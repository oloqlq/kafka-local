# ====================================
# Fluent-Bit 서비스의 전역 행동 설정
# 수집 -> 전처리/추출 x -> 적제(배달) 컨셉
# logstash 연계가(약간의 지연발생) 없었다면 여기서 전처리/필터링등등 작업이 수행될수 있음
# ====================================
[SERVICE]
    Flush       1       # 수집된 데이터를 몇 초 간격으로 내보낼(출력)것인가 설정, 1->1초 마다 데이터 전송 -> 실시간성 설정
    Log_Level   info    # Fluent-Bit 로그에 대한 레벨 설정. (error, warn, info, debug), info:일반실행정보,debug까지 출력됨

# ====================================
# 데이터 수집 Input -> 어디서 데이터를 가져올 것인가
# Input : sensor_json.log
# ====================================
[INPUT]
    # 파일에 끝(tail)에서 읽어온다 -> 플러그인
    Name    tail
    # 읽어올 로그 파일 경로 -> 날짜가 바뀌면, 파일이 커지면? 해결
    Path    /opt/airflow/sensor_logs/sensor_json.log
    # 해당 데이터에 tag 표시, 차후 [Output]에서 태그를 보고 어디로 전송할지 필터링함
    Tag     sensor.json
    # 파일 내용을 미리 정의된 json 파서를 활용하여 구조화된 데이터로 인식 -> 후속 작업은 없음
    Parser  json

# ====================================
# Input : sensor_text.log
# ====================================
[INPUT]
    Name    tail
    Path    /opt/airflow/sensor_logs/sensor_text.log
    Tag     sensor.text

# ====================================
# 데이터 배포 Output -> 데이터를 어디로 보낼 것인가
# Output : kafka
# ====================================
[OUTPUT]
    # kafka 출력 플러그인 사용
    Name    kafka
    # tag가 sensor.json 인 데이터만 출력 설정 => 필터링
    Match   sensor.json
    # 전송할곳 엔드포인트 (kafka의 브로커의 주소)
    # (도커컴포즈 구성시 서비스명):포트 => AWS MSK의 엔드포인트로 교체
    Brokers kafka:9092
    # 데이터를 카프카로 보낼때 -> 토픽명
    Topics  factory-json-topic
    # 전송되는 데이터의 형식 -> JSON 형태 유지
    Format  json

# ====================================
# Output : logstash (http 전송)
# ====================================
[OUTPUT]
    # Fluent-Bit -> logstash 간 프로토콜르 http 사용
    Name    http
    # tag가 sensor.text 인 데이터만 출력 설정 => 필터링 => logstash
    Match   sensor.text
    # 수신 측의 서비스명 기재 -> 도커 컴포즈상에서 logstash 서비스명
    Host    logstash
    # logstash로 보낼때 url, port, 형식
    Port    5044
    URI     /
    Format  json